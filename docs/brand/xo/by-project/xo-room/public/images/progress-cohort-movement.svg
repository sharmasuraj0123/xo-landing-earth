      <rect x="1402" y="460" width="57" height="20" rx="6" fill="#5B0FE6"/>
      <rect x="1402" y="491" width="57" height="5" rx="2" fill="#22222A"/>
      <rect x="1402" y="498" width="57" height="7" rx="3" fill="#464653"/>

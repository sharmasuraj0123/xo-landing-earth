      <rect x="458" y="449" width="57" height="31" rx="6" fill="#5B0FE6"/>
      <rect x="458" y="490" width="57" height="9" rx="4" fill="#22222A"/>
      <rect x="458" y="501" width="57" height="11" rx="5" fill="#464653"/>
      <rect x="458" y="512" width="57" height="45" rx="6" fill="#858593"/>


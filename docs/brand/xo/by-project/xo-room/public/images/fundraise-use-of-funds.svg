<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">XO use of funds by current operating categories</title>
  <desc id="desc">A visual allocation of XO's June-November gross modeled spend across payroll, operations for onboarding and support, infrastructure, AI subscriptions and credits, and marketing and growth. Payroll is 160K, operations is 60K, infrastructure is 180K, AI subscriptions and credits is 180K, marketing and growth is 260K, gross modeled spend is 840K, partner offsets reduce 360K, net modeled cash spend is 480K, and a separate AI model token grant pool adds 200K of extra partner capacity.</desc>
  <rect width="1600" height="980" rx="8" fill="#141418"/>
  <rect x="1" y="1" width="1598" height="978" rx="8" stroke="#2B2B35" stroke-width="2"/>

  <text x="80" y="92" fill="#F5F3FF" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="760">Use of funds</text>
  <text x="80" y="137" fill="#A7A7B5" font-family="Inter, Arial, sans-serif" font-size="24">Current June-November operating model using the same categories as the monthly budget.</text>

  <rect x="80" y="184" width="1440" height="124" rx="8" fill="#1D1D25"/>
  <text x="116" y="236" fill="#A7A7B5" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="650">GROSS MODELED SPEND</text>
  <text x="116" y="278" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="820">$840K</text>
  <text x="486" y="236" fill="#A7A7B5" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="650">PARTNER OFFSET</text>
  <text x="486" y="278" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="820">-$360K</text>
  <text x="824" y="236" fill="#A7A7B5" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="650">NET MODELED CASH</text>
  <text x="824" y="278" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="820">$480K</text>
  <text x="1190" y="236" fill="#A7A7B5" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="650">ROUND</text>
  <text x="1190" y="278" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="820">$500K SAFE</text>

  <text x="80" y="376" fill="#EDEBFF" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="740">Gross spend by category</text>
  <text x="80" y="412" fill="#A7A7B5" font-family="Inter, Arial, sans-serif" font-size="19">Support stays fixed after payroll; Infra and AI can be covered by partner grants, credits, and model-token grants.</text>

  <rect x="80" y="452" width="1440" height="88" rx="8" fill="#20202A"/>

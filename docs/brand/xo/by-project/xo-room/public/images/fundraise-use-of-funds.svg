  <rect x="457" y="452" width="309" height="88" fill="#0EA5E9"/>
  <rect x="766" y="452" width="309" height="88" fill="#F59E0B"/>
  <path d="M1075 452H1512C1516.42 452 1520 455.582 1520 460V532C1520 536.418 1516.42 540 1512 540H1075V452Z" fill="#16A34A"/>

  <text x="104" y="488" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Payroll</text>
  <text x="104" y="517" fill="#EDEBFF" font-family="Inter, Arial, sans-serif" font-size="18">$160K</text>
  <text x="366" y="488" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Support</text>
  <text x="366" y="517" fill="#FCE7F3" font-family="Inter, Arial, sans-serif" font-size="17">$60K</text>
  <text x="482" y="488" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Infrastructure</text>
  <text x="482" y="517" fill="#EAF8FF" font-family="Inter, Arial, sans-serif" font-size="18">$180K</text>
  <text x="792" y="488" fill="#1F1300" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">AI Subs</text>
  <text x="792" y="517" fill="#1F1300" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="740">$180K</text>
  <text x="1102" y="488" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">Marketing &amp; Growth</text>
  <text x="1102" y="517" fill="#EFFFF4" font-family="Inter, Arial, sans-serif" font-size="18">$260K</text>


    <text x="1148" y="641" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Infrastructure</text>
    <text x="1148" y="676" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="850">$180K gross</text>
    <text x="1148" y="704" fill="#A7A7B5" font-family="Inter, Arial, sans-serif" font-size="17">$0 cash if partner grants cover modeled infra</text>

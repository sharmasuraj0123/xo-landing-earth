    <text x="140" y="866" fill="#A7A7B5" font-family="Inter, Arial, sans-serif" font-size="17">$0 cash if AI credits cover modeled usage; token grants add headroom</text>
  </g>

  <g>
    <rect x="824" y="762" width="696" height="118" rx="8" fill="#1D1D25" stroke="#244D33"/>
    <rect x="848" y="788" width="14" height="66" rx="7" fill="#16A34A"/>
    <text x="884" y="803" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Marketing &amp; Growth</text>
    <text x="884" y="838" fill="#BFF7CF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="850">$260K</text>
    <text x="884" y="866" fill="#A7A7B5" font-family="Inter, Arial, sans-serif" font-size="17">Launches, referrals, OpenClaw growth, GTM experiments</text>

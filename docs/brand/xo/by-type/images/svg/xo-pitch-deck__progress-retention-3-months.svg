<svg width="2048" height="900" viewBox="0 0 2048 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Last three months retained users</title>
  <desc id="desc">A dark themed retention chart for February, March, and April showing retained users increasing and retained churn remaining low.</desc>
  <rect width="2048" height="900" rx="24" fill="#18181E"/>
  <rect x="1" y="1" width="2046" height="898" rx="23" stroke="#26262E" stroke-width="2"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g font-size="25" fill="#A5A3AD" font-weight="500">
      <circle cx="45" cy="66" r="5" fill="#5B0FE6"/>
      <text x="65" y="74">Retained</text>
      <circle cx="233" cy="66" r="5" fill="#464653"/>
      <text x="253" y="74">Retained churned</text>
    </g>
    <g stroke="#3B3B49" stroke-width="2" stroke-dasharray="3 6">
      <line x1="132" y1="153" x2="2022" y2="153"/>
      <line x1="132" y1="319" x2="2022" y2="319"/>
      <line x1="132" y1="485" x2="2022" y2="485"/>
      <line x1="132" y1="817" x2="2022" y2="817"/>
    </g>
    <line x1="132" y1="651" x2="2022" y2="651" stroke="#A1A0A8" stroke-width="4"/>
    <g font-size="24" fill="#B1AFBA">
      <text x="38" y="160">60</text>
      <text x="38" y="326">40</text>
      <text x="38" y="493">20</text>
      <text x="51" y="659">0</text>
      <text x="30" y="825">-20</text>
    </g>
    <g>
      <rect x="419" y="464" width="57" height="182" rx="7" fill="#5B0FE6"/>
      <rect x="419" y="657" width="57" height="58" rx="8" fill="#464653"/>
      <rect x="1048" y="322" width="57" height="324" rx="7" fill="#5B0FE6"/>
      <rect x="1048" y="657" width="57" height="33" rx="7" fill="#464653"/>
      <rect x="1679" y="239" width="57" height="407" rx="7" fill="#5B0FE6"/>
    </g>
    <g font-size="22" fill="#A5A3AD">
      <text x="431" y="871">Feb</text>
      <text x="1060" y="871">Mar</text>
      <text x="1692" y="871">Apr</text>
    </g>
  </g>
</svg>

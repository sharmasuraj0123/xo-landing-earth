      <rect x="1804" y="464" width="57" height="16" rx="5" fill="#5B0FE6"/>
      <rect x="1804" y="491" width="57" height="6" rx="3" fill="#22222A"/>
      <rect x="1804" y="501" width="57" height="5" rx="2" fill="#464653"/>
      <rect x="1804" y="506" width="57" height="204" rx="8" fill="#858593"/>

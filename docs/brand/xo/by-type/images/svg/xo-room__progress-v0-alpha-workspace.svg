    <g font-size="22" fill="#A5A3AD">
      <text x="302" y="871">Sep</text>
      <text x="682" y="871">Oct</text>
      <text x="1059" y="871">Nov</text>
      <text x="1439" y="871">Dec</text>
      <text x="1819" y="871">Jan</text>
    </g>
  </g>
</svg>

<svg width="2048" height="900" viewBox="0 0 2048 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">v0 Alpha Workspace cohort movement</title>
  <desc id="desc">A dark themed cohort movement chart from September through January showing new, reactivated, retained, and churned cohorts for the v0 Alpha Workspace period.</desc>
  <rect width="2048" height="900" rx="24" fill="#18181E"/>
  <rect x="1" y="1" width="2046" height="898" rx="23" stroke="#26262E" stroke-width="2"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g font-size="25" fill="#A5A3AD" font-weight="500">
      <circle cx="45" cy="66" r="5" fill="#BAAEFF"/>
      <text x="65" y="74">New</text>
      <circle cx="187" cy="66" r="5" fill="#835DFF"/>
      <text x="207" y="74">Reactivated</text>
      <circle cx="404" cy="66" r="5" fill="#5B0FE6"/>
      <text x="424" y="74">Retained</text>
      <circle cx="592" cy="66" r="5" fill="#22222A"/>
      <text x="612" y="74">Retained churned</text>
      <circle cx="868" cy="66" r="5" fill="#464653"/>
      <text x="888" y="74">Reactivated churned</text>
      <circle cx="1174" cy="66" r="5" fill="#858593"/>
      <text x="1195" y="74">New churned</text>
    </g>

    <g stroke="#3B3B49" stroke-width="2" stroke-dasharray="3 6">
      <line x1="132" y1="153" x2="2022" y2="153"/>
      <line x1="132" y1="319" x2="2022" y2="319"/>
      <line x1="132" y1="651" x2="2022" y2="651"/>
      <line x1="132" y1="817" x2="2022" y2="817"/>
    </g>

    <line x1="132" y1="485" x2="2022" y2="485" stroke="#A1A0A8" stroke-width="4"/>

    <g font-size="24" fill="#B1AFBA">
      <text x="24" y="160">400</text>
      <text x="24" y="326">200</text>
      <text x="51" y="493">0</text>
      <text x="17" y="659">-200</text>
      <text x="17" y="826">-400</text>
    </g>

    <g>
      <!-- Sep -->
      <rect x="292" y="381" width="57" height="76" rx="8" fill="#BAAEFF"/>
      <rect x="292" y="462" width="57" height="7" rx="3" fill="#835DFF"/>
      <rect x="292" y="470" width="57" height="17" rx="5" fill="#5B0FE6"/>
      <rect x="292" y="489" width="57" height="5" rx="2" fill="#22222A"/>
      <rect x="292" y="496" width="57" height="4" rx="2" fill="#464653"/>
      <rect x="292" y="501" width="57" height="3" rx="2" fill="#858593"/>

      <!-- Oct -->
      <rect x="670" y="190" width="57" height="249" rx="8" fill="#BAAEFF"/>
      <rect x="670" y="442" width="57" height="6" rx="3" fill="#835DFF"/>
      <rect x="670" y="449" width="57" height="31" rx="6" fill="#5B0FE6"/>
      <rect x="670" y="490" width="57" height="9" rx="4" fill="#22222A"/>
      <rect x="670" y="501" width="57" height="11" rx="5" fill="#464653"/>
      <rect x="670" y="512" width="57" height="45" rx="6" fill="#858593"/>

      <!-- Nov -->
      <rect x="1048" y="428" width="57" height="18" rx="7" fill="#BAAEFF"/>
      <rect x="1048" y="450" width="57" height="6" rx="3" fill="#835DFF"/>
      <rect x="1048" y="457" width="57" height="23" rx="6" fill="#5B0FE6"/>
      <rect x="1048" y="491" width="57" height="18" rx="6" fill="#22222A"/>
      <rect x="1048" y="512" width="57" height="5" rx="2" fill="#464653"/>
      <rect x="1048" y="519" width="57" height="240" rx="8" fill="#858593"/>

      <!-- Dec -->
      <rect x="1426" y="243" width="57" height="213" rx="8" fill="#BAAEFF"/>
      <rect x="1426" y="460" width="57" height="6" rx="3" fill="#835DFF"/>
      <rect x="1426" y="468" width="57" height="12" rx="5" fill="#5B0FE6"/>
      <rect x="1426" y="491" width="57" height="12" rx="5" fill="#22222A"/>
      <rect x="1426" y="506" width="57" height="6" rx="3" fill="#464653"/>

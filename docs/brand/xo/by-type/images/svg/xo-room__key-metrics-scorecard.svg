<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">XO key metrics operating scorecard</title>
  <desc id="desc">A visual scorecard showing token flow and uptime increasing while support load decreases, with secondary KPIs for active agents, retention, and onboarding time.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111116"/>
      <stop offset="1" stop-color="#17151F"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B7AAFF"/>
      <stop offset="1" stop-color="#5A00E8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#62F3C6"/>
      <stop offset="1" stop-color="#159A72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrowPurple" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L14 8L2 14V2Z" fill="#8A6CFF"/>
    </marker>
    <marker id="arrowGray" markerWidth="16" markerHeight="16" refX="12" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L14 8L2 14V2Z" fill="#8A8B96"/>
    </marker>
    <style>
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F6F3FF; }
      .muted { fill: #A7A5B4; }
      .purple { fill: #B7AAFF; }
      .green { fill: #62F3C6; }
      .gray { fill: #D9D8E2; }
      .small { font-size: 28px; font-weight: 600; }
      .body { font-size: 32px; font-weight: 600; }
      .title { font-size: 58px; font-weight: 780; letter-spacing: 0; }
      .metric { font-size: 68px; font-weight: 820; letter-spacing: 0; }
      .kpi { font-size: 42px; font-weight: 780; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="28" fill="url(#bg)"/>
  <rect x="40" y="40" width="1520" height="820" rx="32" fill="#191821" stroke="#2B2935" stroke-width="2"/>

  <text x="92" y="124" class="label title">XO Key Metrics</text>
  <text x="94" y="174" class="label muted body">Scale agent work while reducing operational drag</text>

  <rect x="1135" y="82" width="330" height="82" rx="18" fill="#211D2F" stroke="#3A334E"/>
  <text x="1165" y="134" class="label small">6-month operating board</text>

  <g filter="url(#shadow)">
    <rect x="92" y="248" width="420" height="280" rx="28" fill="#211D2F" stroke="#463B66"/>
    <rect x="122" y="278" width="118" height="42" rx="21" fill="#2D2550"/>
    <text x="152" y="307" class="label small purple">UP</text>
    <text x="122" y="372" class="label body">Total monthly</text>
    <text x="122" y="416" class="label body">token flow</text>
    <text x="122" y="493" class="label metric purple">10T</text>
    <text x="265" y="493" class="label body muted">tokens / month</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="590" y="248" width="420" height="280" rx="28" fill="#1C2426" stroke="#285C52"/>
    <rect x="620" y="278" width="118" height="42" rx="21" fill="#1D403B"/>
    <text x="650" y="307" class="label small green">UP</text>
    <text x="620" y="372" class="label body">Infrastructure</text>
    <text x="620" y="416" class="label body">uptime</text>
    <text x="620" y="493" class="label metric green">99.9%</text>
    <text x="835" y="493" class="label body muted">plus</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1088" y="248" width="420" height="280" rx="28" fill="#20212B" stroke="#454756"/>
    <rect x="1118" y="278" width="150" height="42" rx="21" fill="#30313C"/>
    <text x="1146" y="307" class="label small gray">DOWN</text>
    <text x="1118" y="372" class="label body">Support tickets</text>
    <text x="1118" y="416" class="label body">and queries</text>
    <text x="1118" y="493" class="label metric gray">Lower</text>
    <text x="1336" y="493" class="label body muted">per usage</text>
  </g>

  <path d="M255 592C405 680 579 710 800 710C1021 710 1195 680 1345 592" stroke="#8A6CFF" stroke-width="6" stroke-linecap="round" marker-end="url(#arrowPurple)"/>
  <path d="M1345 615C1195 755 999 808 800 808C601 808 405 755 255 615" stroke="#5B5D68" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 18" marker-end="url(#arrowGray)"/>

  <rect x="430" y="610" width="740" height="132" rx="28" fill="#191821" stroke="#3A334E"/>
  <text x="800" y="665" text-anchor="middle" class="label kpi">Infrastructure leverage</text>
  <text x="800" y="712" text-anchor="middle" class="label muted body">More agent work. Less manual intervention.</text>

  <g>
    <rect x="92" y="775" width="420" height="56" rx="16" fill="#201D2A" stroke="#332F42"/>
    <circle cx="130" cy="803" r="9" fill="#B7AAFF"/>
    <text x="158" y="814" class="label small">5,000 active agents</text>
  </g>
  <g>
    <rect x="590" y="775" width="420" height="56" rx="16" fill="#201D2A" stroke="#332F42"/>
    <circle cx="628" cy="803" r="9" fill="#62F3C6"/>
    <text x="656" y="814" class="label small">16-week retention up</text>
  </g>
  <g>
    <rect x="1088" y="775" width="420" height="56" rx="16" fill="#201D2A" stroke="#332F42"/>
    <circle cx="1126" cy="803" r="9" fill="#D9D8E2"/>
    <text x="1154" y="814" class="label small">Setup time down</text>
  </g>
</svg>

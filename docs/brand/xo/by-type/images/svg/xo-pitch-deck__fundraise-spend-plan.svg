<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">XO month-by-month categorized spend from June to November</title>
  <desc id="desc">A stacked bar chart showing categorized monthly spend from June through November across payroll, operations for onboarding and support, infrastructure, AI subscriptions and credits, and marketing and growth. Support stays second as the constant category, marketing and growth totals 260K after moving 40K into payroll, gross modeled spend is 840K, 360K can be offset by infrastructure grants and AI credits, and 200K of AI model token grants adds extra partner capacity.</desc>
